name: bible_app
description: The Bible that listens and speaks your language.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0   # for bookmarks
  flutter_tts: ^4.0.2           # for Bible Listen

dev_dependencies:
  flutter_test:
    sdk: flutter
  image: ^4.1.7                   # used by tools/make_brand_assets.dart
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5D4037"
  adaptive_icon_foreground: "assets/brand/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/brand/icon.png"

flutter_native_splash:
  color: "#5D4037"
  image: "assets/brand/splash.png"
  android_12:
    color: "#5D4037"
    image: "assets/brand/splash.png"
  ios: true
  android: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/bibles/web/
    - assets/bibles/bsb/
    - assets/bibles/pidgin/
    - assets/bibles/yoruba/
    - assets/brand/