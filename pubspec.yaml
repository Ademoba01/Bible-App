name: bible_app
description: The Bible that listens and speaks your language.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0   # for bookmarks
  flutter_tts: ^4.0.2           # for Bible Listen
  speech_to_text: ^7.0.0        # for voice search
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.2.0
  google_generative_ai: ^0.4.6
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  url_launcher: ^6.2.0
  lottie: ^3.1.2                # JSON-driven micro-animations (celebrations, transitions)

dev_dependencies:
  flutter_test:
    sdk: flutter
  image: ^4.1.7                   # used by tools/make_brand_assets.dart
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5D4037"
  adaptive_icon_foreground: "assets/brand/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/brand/icon.png"

flutter_native_splash:
  color: "#5D4037"
  image: "assets/brand/splash.png"
  android_12:
    color: "#5D4037"
    image: "assets/brand/splash.png"
  ios: true
  android: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/bibles/kjv/
    - assets/bibles/web/
    - assets/bibles/bsb/
    - assets/bibles/pidgin/
    - assets/bibles/yoruba/
    - assets/brand/
    - assets/kids/
    - assets/data/
    - assets/animations/