<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Shadow filter for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3E2723" flood-opacity="0.3"/>
    </filter>
    <!-- Subtle inner shadow for pages -->
    <filter id="pageShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#3E2723" flood-opacity="0.15"/>
    </filter>
    <!-- Glow for cross -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left page of open book -->
  <g filter="url(#shadow)">
    <rect x="20" y="70" width="72" height="90" rx="6" ry="6" fill="#FFF8E1"
          transform="rotate(-12, 92, 115)"/>
  </g>

  <!-- Right page of open book -->
  <g filter="url(#shadow)">
    <rect x="108" y="70" width="72" height="90" rx="6" ry="6" fill="#FFF8E1"
          transform="rotate(12, 108, 115)"/>
  </g>

  <!-- Left page lines (text representation) -->
  <g transform="rotate(-12, 92, 115)" opacity="0.3" stroke="#8D6E63" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="90" x2="78" y2="90"/>
    <line x1="32" y1="102" x2="74" y2="102"/>
    <line x1="32" y1="114" x2="76" y2="114"/>
    <line x1="32" y1="126" x2="70" y2="126"/>
  </g>

  <!-- Right page lines (text representation) -->
  <g transform="rotate(12, 108, 115)" opacity="0.3" stroke="#8D6E63" stroke-width="1.2" stroke-linecap="round">
    <line x1="122" y1="90" x2="168" y2="90"/>
    <line x1="122" y1="102" x2="164" y2="102"/>
    <line x1="122" y1="114" x2="166" y2="114"/>
    <line x1="122" y1="126" x2="160" y2="126"/>
  </g>

  <!-- Book spine / center fold -->
  <line x1="100" y1="68" x2="100" y2="162" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Spine curve detail (left) -->
  <path d="M 98 70 Q 94 115 98 160" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.3"/>
  <!-- Spine curve detail (right) -->
  <path d="M 102 70 Q 106 115 102 160" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.3"/>

  <!-- Golden cross rising from center of book -->
  <g filter="url(#glow)">
    <!-- Vertical beam -->
    <rect x="95" y="22" width="10" height="50" rx="2" ry="2" fill="#FFC107"/>
    <!-- Horizontal beam -->
    <rect x="83" y="34" width="34" height="10" rx="2" ry="2" fill="#FFC107"/>
  </g>

  <!-- Cross highlight / shine -->
  <rect x="96.5" y="24" width="3" height="46" rx="1" ry="1" fill="#FFD54F" opacity="0.5"/>
  <rect x="85" y="35.5" width="14" height="3" rx="1" ry="1" fill="#FFD54F" opacity="0.5"/>

  <!-- Bottom book cover edge (gives depth) -->
  <path d="M 28 155 Q 100 170 172 155" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
